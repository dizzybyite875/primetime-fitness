<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitGuru Fitness</title>
    <style>
        /* Clean, Simple, All-White Professional Theme */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #ffffff; color: #000000; margin: 0; padding: 0; line-height: 1.6; }
        
        /* Header Section */
        header { padding: 60px 20px 20px 20px; text-align: center; }
        h1 { font-size: 4.5em; margin: 0; letter-spacing: 1px; font-weight: 800; text-transform: uppercase; }
        
        /* Sub-header text directly below Title */
        .sub-header { font-size: 1.4em; font-weight: bold; margin-top: 10px; color: #333333; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Main content layout */
        section { padding: 40px 20px; max-width: 800px; margin: 0 auto; text-align: center; }
        
        /* Single Focused Bootcamp Box */
        .single-box-container { display: flex; justify-content: center; margin-top: 10px; }
        .program-card { background: #ffffff; border: 2px solid #000000; border-radius: 4px; padding: 60px 40px; width: 100%; max-width: 600px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .program-card h3 { font-size: 2.2em; margin-top: 0; margin-bottom: 20px; font-weight: 800; text-transform: uppercase; }
        .program-card p { font-size: 1.3em; font-weight: bold; color: #000000; margin: 0; }
        
        /* Registration Section */
        #register { padding: 60px 20px; margin-top: 20px; text-align: center; border-top: 1px solid #eaeaea; }
        #register h2 { font-size: 2.5em; margin-top: 0; margin-bottom: 15px; font-weight: 800; text-transform: uppercase; }
        
        /* Simple Footer */
        footer { padding: 40px; text-align: center; color: #888888; font-size: 0.9em; border-top: 1px solid #eaeaea; }
    </style>
</head>
<body>
    <header>
        <h1>FitGuru Fitness</h1>
        <p class="sub-header">Youth and Senior Summer Programs</p>
    </header>
    
    <section>
        <div class="single-box-container">
            <div class="program-card">
                <h3>Summer Bootcamp for All Ages</h3>
                <p>Sign up in the form below</p>
            </div>
        </div>
    </section>

    <section id="register">
        <h2>Registration</h2>
        <p style="font-size: 1.2em; color: #555; font-weight: 500;">Our official sign-up form is dropping soon. Get ready to secure your spot!</p>
    </section>

    <footer>
        <p>&copy; 2026 FitGuru Fitness. All rights reserved.</p>
    </footer>
</body>
</html>
